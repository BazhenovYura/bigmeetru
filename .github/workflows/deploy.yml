name: Deploy VK Cloud
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'  # ✅ Next.js happy
        
    - name: Install & Build
      run: |
        npm install --legacy-peer-deps
        npm run build
        
    - name: Show files
      run: ls -la
      
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.VK_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.VK_SECRET_KEY }}
        aws-region: ru-central1
        
    - name: Deploy to VK Cloud
      run: |
        aws s3 sync ./out/ s3://${{ secrets.VK_BUCKET }}/ \
          --endpoint-url https://hb.ru-central1.vkcs.cloud \
          --delete
