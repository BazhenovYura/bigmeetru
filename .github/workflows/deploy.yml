name: Deploy to VK Cloud
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        
    - name: Build project
      run: |
        npm run build
        
    - name: Show build output
      run: |
        echo "📁 Содержимое папки out/:"
        ls -la out/
        
    - name: Check bucket and grant permissions
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🔑 Получаем информацию об аккаунте..."
        CANONICAL_ID=$(aws s3api list-buckets \
          --query "Owner.ID" \
          --output text \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru)
        echo "✅ Canonical ID: $CANONICAL_ID"
        
        echo "📝 Проверяем существование бакета ${{ secrets.VK_BUCKET }}..."
        if aws s3 ls "s3://${{ secrets.VK_BUCKET }}" --endpoint-url https://hb.ru-msk.vkcloud-storage.ru 2>&1 | grep -q 'NoSuchBucket'; then
          echo "❌ Бакет не существует! Создаю..."
          aws s3 mb s3://${{ secrets.VK_BUCKET }} --endpoint-url https://hb.ru-msk.vkcloud-storage.ru
        else
          echo "✅ Бакет существует"
        fi
        
        echo "📝 Выдаем права на бакет..."
        aws s3api put-bucket-acl \
          --bucket ${{ secrets.VK_BUCKET }} \
          --grant-full-control id=$CANONICAL_ID \
          --grant-read id=$CANONICAL_ID \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru || echo "⚠️ Права уже настроены"
        
    - name: Deploy to VK Cloud Storage
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🚀 Синхронизируем файлы с бакетом ${{ secrets.VK_BUCKET }}..."
        aws s3 sync ./out/ s3://${{ secrets.VK_BUCKET }}/ \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru \
          --delete \
          --exclude ".git/*" \
          --exclude ".github/*"
        
        echo "✅ Синхронизация завершена!"
        
    - name: Make files public
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🔓 Делаем все файлы публичными..."
        aws s3 cp s3://${{ secrets.VK_BUCKET }}/ s3://${{ secrets.VK_BUCKET }}/ \
          --recursive \
          --acl public-read \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru
        
        echo "✅ Все файлы теперь доступны по ссылкам"
        
    - name: Get site URL
      run: |
        echo "🌐 Ваш сайт доступен по адресу:"
        echo "https://hb.bizmrg.com/${{ secrets.VK_BUCKET }}/index.html"
        
    - name: Verify deployment
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🔍 Проверка загруженных файлов:"
        aws s3 ls s3://${{ secrets.VK_BUCKET }}/ \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru \
          --recursive \
          --human-readable \
          --summarize
