name: Deploy to VK Cloud
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Diagnose account
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🔍 ДИАГНОСТИКА"
        echo "=============="
        echo "1. Получаем Canonical ID текущего аккаунта:"
        CANONICAL_ID=$(aws s3api list-buckets \
          --query "Owner.ID" \
          --output text \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru)
        echo "✅ Canonical ID: $CANONICAL_ID"
        
        echo "2. Проверяем список бакетов:"
        aws s3 ls --endpoint-url https://hb.ru-msk.vkcloud-storage.ru
        
        echo "3. Проверяем доступ к бакету ${{ secrets.VK_BUCKET }}:"
        aws s3 ls s3://${{ secrets.VK_BUCKET }}/ \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru || echo "❌ Нет доступа к бакету"
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install --legacy-peer-deps
        
    - name: Build project
      run: npm run build
        
    - name: Deploy to VK Cloud Storage
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🚀 Синхронизация с бакетом: ${{ secrets.VK_BUCKET }}"
        aws s3 sync ./out/ s3://${{ secrets.VK_BUCKET }}/ \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru \
          --delete
