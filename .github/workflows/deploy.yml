name: Deploy to VK Cloud
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        
    - name: Build project
      run: |
        npm run build
        
    - name: Show files
      run: ls -la out/
        
    - name: Deploy to VK Cloud Storage
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🚀 Начинаем деплой в бакет: ${{ secrets.VK_BUCKET }}"
        
        # Проверяем существование бакета
        if aws s3 ls "s3://${{ secrets.VK_BUCKET }}" --endpoint-url https://hb.ru-msk.vkcloud-storage.ru 2>&1 | grep -q 'NoSuchBucket'; then
          echo "❌ Бакет ${{ secrets.VK_BUCKET }} не существует!"
          echo "Создайте бакет в панели VK Cloud и повторите деплой"
          exit 1
        fi
        
        # Синхронизируем файлы
        echo "📦 Синхронизируем файлы из папки ./out/"
        aws s3 sync ./out/ s3://${{ secrets.VK_BUCKET }}/ \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru \
          --delete
        
        echo "✅ Деплой завершен успешно!"
