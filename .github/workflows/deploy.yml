name: Deploy to VK Cloud
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        
    - name: Build project
      run: |
        npm run build
        
    - name: Show build output
      run: |
        echo "📁 Содержимое папки out/:"
        ls -la out/
        
    - name: Grant bucket permissions
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🔑 Получаем Canonical ID текущего пользователя..."
        CANONICAL_ID=$(aws s3api list-buckets \
          --query "Owner.ID" \
          --output text \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru)
        
        echo "✅ Canonical ID пользователя: $CANONICAL_ID"
        
        echo "📝 Проверяем существование бакета ${{ secrets.VK_BUCKET }}..."
        if aws s3 ls "s3://${{ secrets.VK_BUCKET }}" --endpoint-url https://hb.ru-msk.vkcloud-storage.ru 2>&1 | grep -q 'NoSuchBucket'; then
          echo "❌ Бакет ${{ secrets.VK_BUCKET }} не существует!"
          echo "Создайте бакет в панели VK Cloud и повторите деплой"
          exit 1
        fi
        
        echo "📝 Выдаем права FULL_CONTROL на бакет ${{ secrets.VK_BUCKET }}..."
        aws s3api put-bucket-acl \
          --bucket ${{ secrets.VK_BUCKET }} \
          --grant-full-control id=$CANONICAL_ID \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru || echo "⚠️  Права уже были выданы или произошла ошибка. Продолжаем..."
        
        echo "✅ Права проверены/выданы"
        
    - name: Deploy to VK Cloud Storage
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🚀 Начинаем синхронизацию с бакетом: ${{ secrets.VK_BUCKET }}"
        
        # Синхронизируем файлы
        aws s3 sync ./out/ s3://${{ secrets.VK_BUCKET }}/ \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru \
          --delete \
          --exclude ".git/*" \
          --exclude ".github/*"
        
        echo "✅ Синхронизация завершена!"
        
    - name: Verify deployment
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.VK_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.VK_SECRET_KEY }}
      run: |
        echo "🔍 Проверка загруженных файлов:"
        aws s3 ls s3://${{ secrets.VK_BUCKET }}/ \
          --endpoint-url https://hb.ru-msk.vkcloud-storage.ru \
          --recursive \
          --human-readable \
          --summarize || echo "⚠️ Не удалось получить список файлов"
