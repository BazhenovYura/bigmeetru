name: Deploy VK Cloud
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install & Build
      run: |
        npm ci
        npm run build
      
    - name: Deploy to VK Cloud
      uses: tinacious/aws-s3-sync@v1
      with:
        source: ./dist
        bucket: ${{ secrets.VK_BUCKET }}
        aws_access_key_id: ${{ secrets.VK_ACCESS_KEY }}
        aws_secret_access_key: ${{ secrets.VK_SECRET_KEY }}
        endpoint: https://hb.ru-central1.vkcs.cloud
        delete: true
