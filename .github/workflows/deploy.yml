name: Deploy VK Cloud
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        # УБИРАЕМ cache: 'npm' ← ВОТ ОНО!
        
    - name: Install & Build
      run: |
        npm config delete cache
        npm install --no-save --legacy-peer-deps --force
        npm run build
        
    - name: Show files
      run: ls -la
      
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.VK_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.VK_SECRET_KEY }}
        aws-region: ru-central1
        
    - name: Deploy to VK Cloud
      run: |
        aws s3 sync ./dist/ s3://${{ secrets.VK_BUCKET }}/ \
          --endpoint-url https://hb.ru-central1.vkcs.cloud \
          --delete
